name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: luma
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: luma
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            binary: luma
            use_cross: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            binary: luma
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: luma.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross || false }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - name: Package Unix archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          asset="luma-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/luma
          tar -C dist -czf "dist/${asset}" luma
          rm dist/luma

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $asset = "luma-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/luma.exe"
          Compress-Archive -Path "dist/luma.exe" -DestinationPath "dist/$asset" -Force
          Remove-Item "dist/luma.exe"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: dist/luma-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum luma-* > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            dist/luma-*.tar.gz
            dist/luma-*.zip
            dist/SHA256SUMS
