name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: contains(matrix.target, 'linux-musl')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [[ "${{ matrix.target }}" == *"linux-musl"* ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar czf luma-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release luma

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/luma.exe -DestinationPath luma-${{ matrix.target }}.zip

      - name: Checksum
        shell: bash
        run: |
          shasum -a 256 luma-${{ matrix.target }}.* > SHA256SUMS-${{ matrix.target }}

      - uses: actions/upload-artifact@v5
        with:
          name: luma-${{ matrix.target }}
          path: |
            luma-${{ matrix.target }}.*
            SHA256SUMS-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          cat artifacts/luma-*/SHA256SUMS-* > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ github.ref_name }} --yes 2>/dev/null || true
          gh release create ${{ github.ref_name }} \
            --title "Luma ${{ github.ref_name }}" \
            --generate-notes \
            --prerelease \
            artifacts/luma-*/luma-* \
            SHA256SUMS
